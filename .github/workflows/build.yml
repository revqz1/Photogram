name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Upload Paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: salute-paper
          path: salute-paper/build/libs/*.jar

      - name: Upload Velocity artifact
        uses: actions/upload-artifact@v4
        with:
          name: salute-velocity
          path: salute-velocity/build/libs/*.jar
