name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you running Salute on?
      options:
        - Paper
        - Velocity
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: Server Version
      description: "Output of `/version` or `/velocity info`"
      placeholder: "e.g. Paper 1.21.4 #123"
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Salute Version
      description: The version of Salute you are using
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Configure ...
        2. Run ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output or stack traces
      render: text
    validations:
      required: false
